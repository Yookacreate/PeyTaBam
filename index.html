<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    
    <!-- ===== PWA Meta Tags ===== -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>مدیریت پرسنل - PeyTaBam</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Vazir:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Vazir', sans-serif; }
        :root { --bg: #f0f4ff; --card: #ffffff; --text: #1a1a2e; --text-secondary: #636e72; --primary: #6c5ce7; --secondary: #00b894; --danger: #e17055; --warning: #fdcb6e; --shadow: 0 15px 40px rgba(108, 92, 231, 0.15); --radius: 24px; --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); --header-gradient: linear-gradient(135deg, #6c5ce7, #a29bfe, #00b894); }
        body.dark { --bg: #0a0a1a; --card: #1a1a2e; --text: #eaeaff; --text-secondary: #a0a0b8; --shadow: 0 15px 40px rgba(0, 0, 0, 0.6); --header-gradient: linear-gradient(135deg, #4a3db8, #7c6fe0, #00876c); }
        body { background: var(--bg); color: var(--text); transition: var(--transition); min-height: 100vh; padding: 12px; display: flex; justify-content: center; align-items: flex-start; }
        .app-container { max-width: 480px; width: 100%; margin: 0 auto; background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 16px 30px; transition: var(--transition); position: relative; overflow: hidden; }
        .app-header { background: var(--header-gradient); padding: 20px 16px; border-radius: 18px; color: #fff; margin-bottom: 22px; text-align: center; position: relative; overflow: hidden; }
        .app-header .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .app-header h1 { font-weight: 900; font-size: 1.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2); flex: 1; }
        .app-header .sub { font-size: 0.85rem; opacity: 0.9; margin-top: 4px; }
        .today-date { background: rgba(255,255,255,0.2); padding: 6px 18px; border-radius: 40px; font-weight: 700; font-size: 0.95rem; backdrop-filter: blur(4px); display: inline-block; cursor: pointer; transition: var(--transition); border: 1px solid rgba(255,255,255,0.1); }
        .today-date:hover { background: rgba(255,255,255,0.3); transform: scale(1.02); }
        .theme-toggle, .logout-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; width: 40px; height: 40px; border-radius: 40px; font-size: 1.2rem; cursor: pointer; backdrop-filter: blur(6px); transition: var(--transition); border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .theme-toggle:hover { transform: rotate(30deg) scale(1.1); background: rgba(255,255,255,0.3); }
        .logout-btn { width: auto; padding: 6px 14px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; font-weight: 700; }
        .logout-btn:hover { background: rgba(255,0,0,0.3); transform: scale(1.05); }
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        .btn { background: var(--primary); border: none; color: #fff; padding: 12px 18px; border-radius: 60px; font-weight: 700; font-size: 0.95rem; width: 100%; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 6px 18px rgba(108, 92, 231, 0.35); margin-top: 8px; }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: var(--secondary); box-shadow: 0 6px 18px rgba(0, 184, 148, 0.35); }
        .btn-danger { background: var(--danger); box-shadow: 0 6px 18px rgba(225, 112, 85, 0.35); }
        .btn-warning { background: var(--warning); color: #2d3436; box-shadow: 0 6px 18px rgba(253, 203, 110, 0.35); }
        .btn-sm { padding: 8px 14px; font-size: 0.8rem; width: auto; display: inline-flex; }
        .input-group { margin: 14px 0 8px; display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; color: var(--text); }
        .input-group input, .input-group select, .input-group textarea { padding: 14px 18px; border-radius: 60px; border: 2px solid #dfe6e9; background: var(--bg); color: var(--text); font-size: 1rem; transition: var(--transition); outline: none; width: 100%; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0; }
        .stat-card { background: var(--bg); padding: 14px 8px; border-radius: 18px; text-align: center; transition: var(--transition); border: 1px solid rgba(108, 92, 231, 0.08); }
        .stat-card .num { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
        .stat-card .label { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; }
        .list-item { background: var(--bg); padding: 12px 14px; border-radius: 18px; margin: 6px 0; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); border-right: 5px solid var(--primary); }
        .list-item .name { font-weight: 700; }
        .list-item .time { font-size: 0.75rem; opacity: 0.7; }
        .badge { background: var(--primary); color: #fff; padding: 4px 14px; border-radius: 40px; font-size: 0.7rem; font-weight: 700; }
        .badge-out { background: var(--danger); }
        .badge-success { background: var(--secondary); }
        .shift-tag { background: var(--secondary); color: #fff; padding: 2px 10px; border-radius: 40px; font-size: 0.65rem; display: inline-block; }
        .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 18px; border: none; border-radius: 60px; background: var(--bg); color: var(--text); font-weight: 700; cursor: pointer; transition: var(--transition); flex: 1; min-width: 80px; font-size: 0.85rem; }
        .tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 6px 18px rgba(108, 92, 231, 0.3); }
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal.show { display: flex; }
        .modal-content { background: var(--card); padding: 24px; border-radius: 24px; max-width: 420px; width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin: 12px 0; }
        .calendar-grid .day-header { text-align: center; font-weight: 700; font-size: 0.75rem; padding: 6px 0; color: var(--text-secondary); }
        .calendar-grid .day { padding: 10px 4px; text-align: center; border-radius: 12px; cursor: pointer; transition: var(--transition); font-size: 0.85rem; border: 2px solid transparent; }
        .calendar-grid .day:hover { background: var(--primary); color: #fff; transform: scale(1.05); }
        .calendar-grid .day.today { border-color: var(--primary); }
        .request-item { background: var(--bg); padding: 12px; border-radius: 14px; margin: 8px 0; border-right: 4px solid var(--warning); }
        .request-item .actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .request-item .actions button { padding: 4px 16px; border: none; border-radius: 40px; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: var(--transition); }
        .request-item .actions button:hover { transform: scale(1.05); }
        .btn-approve { background: var(--secondary); color: #fff; }
        .btn-reject { background: var(--danger); color: #fff; }
        .footer { margin-top: 28px; text-align: center; font-size: 0.7rem; opacity: 0.5; border-top: 1px solid rgba(108, 92, 231, 0.08); padding-top: 16px; }
        @media (max-width: 420px) { .app-container { padding: 12px; } .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } .stat-card .num { font-size: 1.4rem; } }
        
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(12px); }
        .login-overlay.hidden { display: none; }
        .login-box { background: var(--card); padding: 32px 24px; border-radius: 24px; max-width: 380px; width: 90%; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        .login-box .logo { font-size: 3rem; margin-bottom: 12px; }
        .login-box h2 { margin-bottom: 20px; color: var(--text); }
        .login-box .input-group { margin: 12px 0; }
        .login-box .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 8px; display: none; }
        .login-box .login-error.show { display: block; }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
        .is-admin .tab-btn.admin-only { display: inline-flex !important; }
        
        .toast { position: fixed; bottom: 30px; right: 30px; background: #1f3a57; color: white; padding: 12px 24px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 99999; font-family: 'Vazir', Tahoma, sans-serif; font-size: 0.9rem; opacity: 0; transform: translateY(20px); transition: all 0.3s ease; pointer-events: none; max-width: 90%; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #2E7D32; }
        .toast.error { background: #C62828; }
        .toast.info { background: #0D47A1; }
        .toast.warning { background: #E65100; }
        
        .leave-status-box { background: var(--bg); border-radius: 16px; padding: 12px 16px; margin: 8px 0; border-right: 4px solid var(--primary); }
        .leave-status-box .status-approved { color: var(--secondary); font-weight: bold; }
        .leave-status-box .status-rejected { color: var(--danger); font-weight: bold; }
        .leave-status-box .status-pending { color: var(--warning); font-weight: bold; }
        .leave-status-box .reason-text { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; padding: 6px 10px; background: rgba(0,0,0,0.05); border-radius: 8px; }
        
        .reject-reason-modal .modal-content { max-width: 400px; }
        .reject-reason-modal textarea { min-height: 80px; resize: vertical; }
        
        /* جدول تاریخچه پرسنل */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .history-table th { background: var(--primary); color: #fff; padding: 8px; text-align: center; }
        .history-table td { padding: 8px; text-align: center; border-bottom: 1px solid var(--bg); }
        .history-table tr:nth-child(even) { background: var(--bg); }
        .history-table .status-approved { color: var(--secondary); font-weight: bold; }
        .history-table .status-rejected { color: var(--danger); font-weight: bold; }
        .history-table .status-pending { color: var(--warning); font-weight: bold; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <div class="logo">🏢</div>
        <h2>ورود به سیستم</h2>
        <div class="input-group">
            <label><i class="fas fa-user"></i> نام کاربری</label>
            <input type="text" id="loginUsername" placeholder="نام کاربری">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> رمز عبور</label>
            <input type="password" id="loginPassword" placeholder="رمز عبور">
        </div>
        <div class="login-error" id="loginError">❌ نام کاربری یا رمز اشتباه است!</div>
        <button class="btn btn-secondary" id="loginUserBtn" style="margin-top:16px;"><i class="fas fa-sign-in-alt"></i> ورود</button>
    </div>
</div>

<!-- APP -->
<div class="app-container" id="app" style="display:none;">
    <div class="app-header">
        <div class="top-row">
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <h1>🏢 PeyTaBam</h1>
            <div class="header-buttons">
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> خروج</button>
            </div>
        </div>
        <div class="sub">
            <span>مدیریت هوشمند پرسنل</span>
            <span class="today-date" id="todayDate" onclick="openCalendar()">---</span>
        </div>
        <div style="margin-top:8px;font-size:0.8rem;opacity:0.8;">
            <span id="currentTime">⏰ --:--</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="icon">✅</div><div class="num" id="presentCount">۰</div><div class="label">حاضر</div></div>
        <div class="stat-card"><div class="icon">🌙</div><div class="num" id="leaveCount">۰</div><div class="label">مرخصی</div></div>
        <div class="stat-card"><div class="icon">❌</div><div class="num" id="absentCount">۰</div><div class="label">غایب</div></div>
    </div>

    <div id="leaveStatusMessage" style="display:none;"></div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="personnel"><i class="fas fa-user-check"></i> پرسنل</button>
        <button class="tab-btn admin-only" data-tab="admin"><i class="fas fa-crown"></i> مدیریت</button>
        <button class="tab-btn admin-only" data-tab="reports"><i class="fas fa-chart-bar"></i> گزارشات</button>
    </div>

    <div class="tab-content active" id="tab-personnel">
        <div class="input-group">
            <label><i class="fas fa-user"></i> پرسنل فعلی: <span id="currentPersonName" style="font-weight:bold;color:var(--primary);">---</span></label>
        </div>
        <div style="display:flex;gap:8px;margin:6px 0 10px;flex-wrap:wrap;">
            <button class="btn" id="checkinBtn" style="flex:1;min-width:100px;"><i class="fas fa-sign-in-alt"></i> ورود</button>
            <button class="btn btn-danger" id="checkoutBtn" style="flex:1;min-width:100px;"><i class="fas fa-sign-out-alt"></i> خروج</button>
            <button class="btn btn-warning" id="leaveRequestBtn" style="flex:1;min-width:100px;"><i class="fas fa-calendar-alt"></i> مرخصی</button>
        </div>
        
        <!-- ===== جدول تاریخچه پرسنل ===== -->
        <h4 style="margin-top:16px;"><i class="fas fa-history"></i> تاریخچه فعالیت‌ها</h4>
        <div id="personHistory" style="max-height:300px;overflow-y:auto;"></div>
        
        <div class="admin-only">
            <h4 style="margin-top:16px;"><i class="fas fa-users"></i> لیست پرسنل</h4>
            <div id="personList"></div>
        </div>
    </div>

    <div class="tab-content admin-only" id="tab-admin">
        <div class="input-group">
            <label><i class="fas fa-user-plus"></i> افزودن/ویرایش پرسنل</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <input type="text" id="editPersonId" placeholder="ID" style="flex:0.5;min-width:40px;display:none;">
                <input type="text" id="newName" placeholder="نام و فامیلی" style="flex:2;min-width:120px;">
                <input type="text" id="newPass" placeholder="رمز" style="flex:1;min-width:80px;">
                <select id="newShift" style="flex:1;min-width:100px;">
                    <option value="ثابت">ثابت</option>
                    <option value="شیفتی ۳۶/۱۲">شیفتی ۳۶/۱۲</option>
                    <option value="پاره وقت">پاره وقت</option>
                    <option value="شیفت شب">شیفت شب</option>
                </select>
                <button class="btn btn-sm btn-secondary" id="addPersonBtn"><i class="fas fa-plus"></i></button>
                <button class="btn btn-sm btn-danger" id="cancelEditBtn" style="display:none;"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <h4>📋 مدیریت پرسنل</h4>
        <div id="adminPersonList" style="max-height:300px;overflow-y:auto;"></div>
        <h4 style="margin-top:16px;">📝 درخواست‌های مرخصی در انتظار تایید</h4>
        <div id="requestsList"></div>
        <hr style="margin:16px 0;border-color:rgba(108,92,231,0.1);">
        <h4>🔐 مدیریت مدیران</h4>
        <div class="input-group">
            <label>افزودن مدیر جدید</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <input type="text" id="newAdminName" placeholder="نام مدیر" style="flex:2;min-width:120px;">
                <input type="text" id="newAdminPass" placeholder="رمز" style="flex:1;min-width:80px;">
                <button class="btn btn-sm btn-secondary" id="addAdminBtn"><i class="fas fa-user-plus"></i></button>
            </div>
        </div>
        <div id="adminList" style="max-height:150px;overflow-y:auto;"></div>
        <div class="input-group" style="margin-top:12px;">
            <label>تغییر رمز مدیریت اصلی</label>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <input type="password" id="newMainPass" placeholder="رمز جدید" style="flex:2;min-width:120px;">
                <button class="btn btn-sm btn-secondary" id="changeMainPassBtn"><i class="fas fa-key"></i></button>
            </div>
        </div>
        <button class="btn btn-danger" id="resetAllBtn" style="margin-top:12px;"><i class="fas fa-trash"></i> ریست کامل</button>
    </div>

    <div class="tab-content admin-only" id="tab-reports">
        <div class="input-group">
            <label><i class="fas fa-calendar-month"></i> انتخاب ماه شمسی</label>
            <select id="reportMonthSelect" style="padding:14px 18px; border-radius:60px; border:2px solid #dfe6e9; background:var(--bg); color:var(--text); font-size:1rem; outline:none; width:100%;">
                <option value="">-- انتخاب کنید --</option>
            </select>
        </div>
        <div class="input-group">
            <label><i class="fas fa-user"></i> انتخاب پرسنل (اختیاری)</label>
            <select id="reportPersonSelect" style="padding:14px 18px; border-radius:60px; border:2px solid #dfe6e9; background:var(--bg); color:var(--text); font-size:1rem; outline:none; width:100%;">
                <option value="">-- همه پرسنل --</option>
            </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
            <button class="btn" id="exportExcelBtn" style="flex:1;"><i class="fas fa-file-excel"></i> اکسل</button>
            <button class="btn btn-secondary" id="exportPdfBtn" style="flex:1;"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
        <div id="reportPreview" style="margin-top:16px;max-height:300px;overflow-y:auto;"></div>
    </div>

    <div class="footer">طراحی توسط <strong>میثاق نوین طرح</strong> © ۱۴۰۵</div>
</div>

<!-- CALENDAR MODAL -->
<div class="modal" id="calendarModal">
    <div class="modal-content">
        <h3><i class="fas fa-calendar-alt"></i> تقویم شمسی</h3>
        <div style="display:flex;justify-content:space-between;margin:10px 0;">
            <button class="btn btn-sm btn-secondary" onclick="changeMonth(-1)"><i class="fas fa-chevron-right"></i></button>
            <span id="calendarMonthYear" style="font-weight:700;font-size:1.1rem;"></span>
            <button class="btn btn-sm btn-secondary" onclick="changeMonth(1)"><i class="fas fa-chevron-left"></i></button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <button class="btn btn-sm btn-secondary" onclick="closeCalendar()" style="margin-top:12px;">بستن</button>
    </div>
</div>

<!-- LEAVE MODAL -->
<div class="modal" id="leaveModal">
    <div class="modal-content">
        <h3><i class="fas fa-calendar-plus"></i> درخواست مرخصی</h3>
        <div class="input-group">
            <label>نوع مرخصی</label>
            <select id="leaveType">
                <option value="ساعتی">ساعتی</option>
                <option value="روزانه">روزانه</option>
            </select>
        </div>
        <div class="input-group">
            <label>تاریخ</label>
            <input type="text" id="leaveDate" placeholder="کلیک کنید" readonly onclick="openCalendarForLeave()">
        </div>
        <div class="input-group" id="hourGroup" style="display:none;">
            <label><i class="fas fa-clock"></i> ساعت</label>
            <input type="time" id="leaveHour" value="09:00">
        </div>
        <div class="input-group">
            <label>توضیحات</label>
            <textarea id="leaveDesc" rows="2" placeholder="دلیل مرخصی..."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px;">
            <button class="btn btn-secondary" id="submitLeaveBtn"><i class="fas fa-check"></i> ثبت</button>
            <button class="btn btn-danger" onclick="closeLeaveModal()"><i class="fas fa-times"></i> انصراف</button>
        </div>
    </div>
</div>

<!-- REJECT REASON MODAL -->
<div class="modal reject-reason-modal" id="rejectReasonModal">
    <div class="modal-content">
        <h3><i class="fas fa-times-circle" style="color:var(--danger);"></i> علت رد مرخصی</h3>
        <div class="input-group">
            <label>دلیل رد:</label>
            <textarea id="rejectReasonText" rows="3" placeholder="لطفاً علت رد درخواست مرخصی را بنویسید..."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px;">
            <button class="btn btn-danger" id="confirmRejectBtn"><i class="fas fa-check"></i> تایید رد</button>
            <button class="btn btn-secondary" onclick="closeRejectReasonModal()"><i class="fas fa-times"></i> انصراف</button>
        </div>
    </div>
</div>

<script>
// ================================================================
// ===== الگوریتم دقیق تاریخ شمسی =====
// ================================================================

function toJalali(gy, gm, gd) {
    var g_d_m = [0, 31, 59, 90, 120, 151, 181, 212, 243, 273, 304, 334];
    var jy, jm, jd, days, gy2;
    gy2 = (gm > 2) ? (gy + 1) : gy;
    days = 355666 + (365 * gy) + Math.floor((gy2 + 3) / 4) - Math.floor((gy2 + 99) / 100) + Math.floor((gy2 + 399) / 400) + gd + g_d_m[gm - 1];
    jy = -1595 + (33 * Math.floor(days / 12053));
    days %= 12053;
    jy += 4 * Math.floor(days / 1461);
    days %= 1461;
    if (days > 365) {
        jy += Math.floor((days - 1) / 365);
        days = (days - 1) % 365;
    }
    if (days < 186) {
        jm = 1 + Math.floor(days / 31);
        jd = 1 + (days % 31);
    } else {
        jm = 7 + Math.floor((days - 186) / 30);
        jd = 1 + ((days - 186) % 30);
    }
    return { year: jy, month: jm, day: jd };
}

function getPersianDate(date) {
    date = date || new Date();
    return toJalali(date.getFullYear(), date.getMonth() + 1, date.getDate());
}

function getToday() {
    var j = getPersianDate(new Date());
    return j.year + '/' + String(j.month).padStart(2, '0') + '/' + String(j.day).padStart(2, '0');
}

function getTodayDisplay() {
    var now = new Date();
    var j = getPersianDate(now);
    var weekdays = ['یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه', 'شنبه'];
    var months = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
    var wd = now.getDay();
    return weekdays[wd] + ' ' + toPersianNumber(j.day) + ' ' + months[j.month - 1] + ' ' + toPersianNumber(j.year);
}

function toPersianNumber(num) {
    var p = ['۰', '۱', '۲', '۳', '۴', '۵', '۶', '۷', '۸', '۹'];
    return String(num).replace(/\d/g, function(d) { return p[parseInt(d)]; });
}

function getTime() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    return h + ':' + m + ':' + s;
}

function getFullDateTime() {
    return getToday() + ' ' + getTime();
}

function getDaysInPersianMonth(year, month) {
    if (month <= 6) return 31;
    if (month <= 11) return 30;
    var leap = (year % 33 === 1 || year % 33 === 5 || year % 33 === 9 || 
               year % 33 === 13 || year % 33 === 17 || year % 33 === 22 || 
               year % 33 === 26 || year % 33 === 30);
    return leap ? 30 : 29;
}

function jalaliToGregorian(jy, jm, jd) {
    var epbase = jy - (jy >= 0 ? 474 : 473);
    var epyear = 474 + epbase % 2820;
    var jdn = jd + (jm <= 6 ? (jm - 1) * 31 : (jm - 1) * 30 + 6) +
        Math.floor((epyear * 682 - 110) / 2816) +
        (epyear - 1) * 365 +
        Math.floor(epbase / 2820) * 1029983 +
        1948320.5;
    var j = Math.floor(jdn) + 32044;
    var g = Math.floor(j / 146097);
    var dg = j % 146097;
    var c = Math.floor((Math.floor(dg / 36524) + 1) * 3 / 4);
    var dc = dg - c * 36524;
    var b = Math.floor(dc / 1461);
    var db = dc % 1461;
    var a = Math.floor((Math.floor(db / 365) + 1) * 3 / 4);
    var da = db - a * 365;
    var y = g * 400 + c * 100 + b * 4 + a;
    var m2 = Math.floor((da * 5 + 308) / 153) - 2;
    var d2 = da - Math.floor((m2 + 4) * 153 / 5) + 122;
    return {
        year: y - 4800 + Math.floor((m2 + 2) / 12),
        month: (m2 + 2) % 12 + 1,
        day: d2 + 1
    };
}

function getFirstDayOfPersianMonth(year, month) {
    var g = jalaliToGregorian(year, month, 1);
    var date = new Date(g.year, g.month - 1, g.day);
    var jsDay = date.getDay();
    return (jsDay + 1) % 7;
}

// ================================================================
// Toast Notification
// ================================================================

function showToast(message, type, duration) {
    type = type || 'info';
    duration = duration || 5000;
    var toast = document.getElementById('toast') || createToast();
    toast.textContent = message;
    toast.className = 'toast ' + type;
    setTimeout(function() { toast.classList.add('show'); }, 10);
    clearTimeout(toast._hide);
    toast._hide = setTimeout(function() { toast.classList.remove('show'); }, duration);
}

function createToast() {
    var toast = document.createElement('div');
    toast.id = 'toast';
    document.body.appendChild(toast);
    return toast;
}

// ================================================================
// ===== ارسال اعلان به مرورگر =====
// ================================================================

function sendNotification(title, body) {
    if (!('Notification' in window)) {
        console.log('این مرورگر از Notification پشتیبانی نمیکند');
        return;
    }
    
    if (Notification.permission === 'granted') {
        new Notification(title, {
            body: body,
            icon: 'icons/icon-192.png',
            requireInteraction: true
        });
    } else if (Notification.permission === 'default') {
        Notification.requestPermission().then(function(permission) {
            if (permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: 'icons/icon-192.png',
                    requireInteraction: true
                });
            }
        });
    }
}

// ================================================================
// ===== ذخیره و دریافت اعلان‌های پرسنل =====
// ================================================================

function saveUserNotification(personIdx, data) {
    var notifications = JSON.parse(localStorage.getItem('peytabam_notifications')) || [];
    notifications.push({
        personIdx: personIdx,
        ...data,
        timestamp: Date.now()
    });
    localStorage.setItem('peytabam_notifications', JSON.stringify(notifications));
}

function getUserNotifications(personIdx) {
    var notifications = JSON.parse(localStorage.getItem('peytabam_notifications')) || [];
    return notifications.filter(function(n) { return n.personIdx === personIdx; });
}

function clearUserNotifications(personIdx) {
    var notifications = JSON.parse(localStorage.getItem('peytabam_notifications')) || [];
    notifications = notifications.filter(function(n) { return n.personIdx !== personIdx; });
    localStorage.setItem('peytabam_notifications', JSON.stringify(notifications));
}

// ================================================================
// ===== اتصال به API لیارا =====
// ================================================================

var API_URL = 'https://peytabam-api.liara.run';
var isSyncing = false;
var lastSaveTime = 0;
var appReady = false; // اپ هنوز آماده نیست

function saveToServer() {
    // اگه اپ هنوز آماده نشده، ذخیره نکن
    if (!appReady) return;
    var now = Date.now();
    lastSaveTime = now;
    var data = {
        persons: persons,
        logs: logs,
        leaves: leaves,
        admins: admins,
        mainAdminPass: mainAdminPass,
        lastUpdate: now
    };
    fetch(API_URL + '/data', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(function() { console.log('✅ ذخیره در سرور'); })
    .catch(function(e) { console.error('❌ خطا در ذخیره:', e); });
}

function loadFromServer() {
    if (isSyncing) return;
    isSyncing = true;
    fetch(API_URL + '/data')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (!data) return;
        if (data.lastUpdate && data.lastUpdate < lastSaveTime) return;
        var newPersons = data.persons || [];
        var newLogs = data.logs || [];
        var newLeaves = data.leaves || [];
        var newAdmins = data.admins || [];

        var changed = (
            JSON.stringify(newPersons) !== JSON.stringify(persons) ||
            JSON.stringify(newLogs) !== JSON.stringify(logs) ||
            JSON.stringify(newLeaves) !== JSON.stringify(leaves) ||
            JSON.stringify(newAdmins) !== JSON.stringify(admins)
        );
        if (changed) {
            persons = newPersons;
            logs = newLogs;
            leaves = newLeaves;
            admins = newAdmins;
            mainAdminPass = data.mainAdminPass || 'admin123';
            localStorage.setItem('peytabam_persons', JSON.stringify(persons));
            localStorage.setItem('peytabam_logs', JSON.stringify(logs));
            localStorage.setItem('peytabam_leaves', JSON.stringify(leaves));
            localStorage.setItem('peytabam_admins', JSON.stringify(admins));
            localStorage.setItem('peytabam_main_pass', mainAdminPass);
            render();
            console.log('🔄 داده‌ها از سرور بروز شد');
            if (isAdmin) {
                var pendingCount = leaves.filter(function(l) { return l.status === 'pending'; }).length;
                if (pendingCount > 0) {
                    showToast('📝 ' + pendingCount + ' درخواست مرخصی جدید در انتظار تایید!', 'warning');
                }
            }
        }
    })
    .catch(function(e) { console.error('❌ خطا در دریافت:', e); })
    .finally(function() { isSyncing = false; });
}

// ===== بارگذاری اولیه از سرور - قبل از راه‌اندازی اپ =====
function initAppFromServer() {
    fetch(API_URL + '/data')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data && (data.persons || data.logs || data.leaves)) {
            persons = data.persons || [];
            logs = data.logs || [];
            leaves = data.leaves || [];
            admins = data.admins || [];
            mainAdminPass = data.mainAdminPass || 'admin123';
            localStorage.setItem('peytabam_persons', JSON.stringify(persons));
            localStorage.setItem('peytabam_logs', JSON.stringify(logs));
            localStorage.setItem('peytabam_leaves', JSON.stringify(leaves));
            localStorage.setItem('peytabam_admins', JSON.stringify(admins));
            localStorage.setItem('peytabam_main_pass', mainAdminPass);
            console.log('✅ داده‌های اولیه از سرور بارگذاری شد');
        }
    })
    .catch(function(e) { console.warn('⚠️ سرور در دسترس نیست، از localStorage استفاده میشه'); })
    .finally(function() {
        appReady = true;
        render();
        // بعد از راه‌اندازی، هر ۵ ثانیه sync کن
        setInterval(loadFromServer, 5000);
    });
}

document.addEventListener('visibilitychange', function() {
    if (!document.hidden) loadFromServer();
});

var _origSaveData = saveData;
saveData = function() {
    _origSaveData();
    saveToServer();
};

// ================================================================
// برنامه اصلی
// ================================================================

var persons = JSON.parse(localStorage.getItem('peytabam_persons')) || [];
var logs = JSON.parse(localStorage.getItem('peytabam_logs')) || [];
var leaves = JSON.parse(localStorage.getItem('peytabam_leaves')) || [];
var admins = JSON.parse(localStorage.getItem('peytabam_admins')) || [];
var mainAdminPass = localStorage.getItem('peytabam_main_pass') || 'admin123';
var isDark = localStorage.getItem('peytabam_dark') === 'true';
var isAdmin = false;
var currentUser = null;
var editingPersonId = null;
var selectedMonth = '';
var calendarYear = 1405;
var calendarMonth = 4;
var leaveDateTarget = '';
var clockInterval = null;
var leaveModalWasOpen = false;
var pendingRejectIndex = null;

function saveData() {
    localStorage.setItem('peytabam_persons', JSON.stringify(persons));
    localStorage.setItem('peytabam_logs', JSON.stringify(logs));
    localStorage.setItem('peytabam_leaves', JSON.stringify(leaves));
    localStorage.setItem('peytabam_admins', JSON.stringify(admins));
    localStorage.setItem('peytabam_main_pass', mainAdminPass);
    localStorage.setItem('peytabam_dark', String(isDark));
    saveToServer();
}

function render() {
    var today = getToday();
    var select = document.getElementById('personSelect');
    var listDiv = document.getElementById('personList');
    var adminListDiv = document.getElementById('adminPersonList');
    var requestsDiv = document.getElementById('requestsList');
    var reportPreview = document.getElementById('reportPreview');
    var adminListDiv2 = document.getElementById('adminList');
    var leaveStatusDiv = document.getElementById('leaveStatusMessage');
    var historyDiv = document.getElementById('personHistory');
    var personNameSpan = document.getElementById('currentPersonName');
    
    document.getElementById('todayDate').textContent = getTodayDisplay();
    document.getElementById('currentTime').textContent = '⏰ ' + getTime();
    
    // ===== نمایش نام پرسنل فعلی =====
    if (!isAdmin && currentUser !== null && currentUser !== 'admin') {
        var currentPerson = persons[currentUser];
        personNameSpan.textContent = currentPerson ? currentPerson.name + ' (' + currentPerson.shift + ')' : '---';
    } else {
        personNameSpan.textContent = isAdmin ? 'مدیر' : '---';
    }
    
    // ===== تاریخچه پرسنل =====
    if (!isAdmin && currentUser !== null && currentUser !== 'admin') {
        var userLogs = logs.filter(function(l) { return l.personIdx === currentUser; }).slice(-20).reverse();
        var userLeaves = leaves.filter(function(l) { return l.personIdx === currentUser; }).slice(-20).reverse();
        
        var allHistory = [];
        userLogs.forEach(function(l) {
            allHistory.push({ type: l.type === 'in' ? '✅ ورود' : '❌ خروج', date: l.date, time: l.time, status: 'ثبت شده', statusClass: 'status-approved' });
        });
        userLeaves.forEach(function(l) {
            var statusText = l.status === 'approved' ? '✅ تایید شده' : (l.status === 'rejected' ? '❌ رد شده' : '⏳ در انتظار');
            var statusClass = l.status === 'approved' ? 'status-approved' : (l.status === 'rejected' ? 'status-rejected' : 'status-pending');
            var desc = l.desc ? ' (' + l.desc + ')' : '';
            var hourText = l.hour ? ' ساعت ' + l.hour : '';
            allHistory.push({ type: '🌙 ' + l.type + ' مرخصی' + hourText + desc, date: l.date, time: l.hour || '---', status: statusText, statusClass: statusClass });
        });
        allHistory.sort(function(a, b) { return b.date.localeCompare(a.date) || b.time.localeCompare(a.time); });
        
        if (allHistory.length === 0) {
            historyDiv.innerHTML = '<span style="opacity:0.5;">هیچ فعالیتی ثبت نشده است</span>';
        } else {
            var html = '<table class="history-table"><thead><tr><th>نوع</th><th>تاریخ</th><th>ساعت</th><th>وضعیت</th></tr></thead><tbody>';
            allHistory.forEach(function(item) {
                html += '<tr><td>' + item.type + '</td><td>' + item.date + '</td><td>' + item.time + '</td><td class="' + item.statusClass + '">' + item.status + '</td></tr>';
            });
            html += '</tbody></table>';
            historyDiv.innerHTML = html;
        }
    } else {
        historyDiv.innerHTML = '<span style="opacity:0.5;">برای مشاهده تاریخچه وارد شوید</span>';
    }
    
    // ===== نمایش وضعیت مرخصی برای پرسنل =====
    if (!isAdmin && currentUser !== null && currentUser !== 'admin') {
        var userLeaves2 = leaves.filter(function(l) { return l.personIdx === currentUser; });
        var lastLeave = userLeaves2.length > 0 ? userLeaves2[userLeaves2.length - 1] : null;
        if (lastLeave) {
            var statusText = '';
            var statusClass = '';
            var reasonHtml = '';
            if (lastLeave.status === 'approved') {
                statusText = '✅ درخواست مرخصی شما تایید شد';
                statusClass = 'status-approved';
            } else if (lastLeave.status === 'rejected') {
                statusText = '❌ درخواست مرخصی شما رد شد';
                statusClass = 'status-rejected';
                if (lastLeave.reason) {
                    reasonHtml = '<div class="reason-text">📝 دلیل رد: ' + lastLeave.reason + '</div>';
                }
            } else {
                statusText = '⏳ درخواست مرخصی شما در انتظار تایید است';
                statusClass = 'status-pending';
            }
            leaveStatusDiv.style.display = 'block';
            leaveStatusDiv.className = 'leave-status-box';
            leaveStatusDiv.innerHTML = '<div class="' + statusClass + '">' + statusText + '</div>' + reasonHtml;
        } else {
            leaveStatusDiv.style.display = 'none';
        }
    } else {
        leaveStatusDiv.style.display = 'none';
    }
    
    if (isAdmin && listDiv) {
        listDiv.innerHTML = '';
        persons.forEach(function(p, idx) {
            var lastLog = logs.filter(function(l) { return l.personIdx === idx; }).slice(-1)[0];
            var status = lastLog && lastLog.type === 'in' ? '✅ حاضر' : '❌ خارج';
            var div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = 
                '<div><span class="name">' + p.name + '</span><span class="shift-tag">' + p.shift + '</span><div class="time">' + status + '</div></div>' +
                '<div><span class="badge ' + (lastLog && lastLog.type === 'in' ? 'badge-success' : 'badge-out') + '">' + (lastLog ? lastLog.time : '---') + '</span></div>';
            listDiv.appendChild(div);
        });
    }
    
    if (adminListDiv && isAdmin) {
        adminListDiv.innerHTML = '';
        persons.forEach(function(p, idx) {
            var div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = 
                '<div><span class="name">' + p.name + '</span><span class="shift-tag">' + p.shift + '</span><div class="time">🔑 ' + p.password + '</div></div>' +
                '<div style="display:flex;gap:6px;flex-wrap:wrap;">' +
                '<button class="btn btn-sm" style="background:#e17055;color:#fff;" onclick="exportPersonPdf(' + idx + ')" title="خروجی PDF"><i class="fas fa-file-pdf"></i></button>' +
                '<button class="btn btn-sm btn-secondary" onclick="editPerson(' + idx + ')"><i class="fas fa-edit"></i></button>' +
                '<button class="btn btn-sm btn-danger" onclick="deletePerson(' + idx + ')"><i class="fas fa-trash"></i></button>' +
                '</div>';
            adminListDiv.appendChild(div);
        });
    }
    
    // ===== درخواست‌های مرخصی - فقط نمایش pending =====
    if (requestsDiv && isAdmin) {
        requestsDiv.innerHTML = '';
        var pendingLeaves = leaves.filter(function(l) { return l.status === 'pending'; });
        if (pendingLeaves.length === 0) {
            requestsDiv.innerHTML = '<span style="opacity:0.5;">✅ هیچ درخواست مرخصی در انتظار تایید نیست</span>';
        } else {
            pendingLeaves.forEach(function(l, idx) {
                var realIdx = leaves.indexOf(l);
                var p = persons[l.personIdx];
                var div = document.createElement('div');
                div.className = 'request-item';
                var hourText = l.hour ? ' ساعت ' + l.hour : '';
                div.innerHTML = 
                    '<div><strong>' + (p ? p.name : 'نامشخص') + '</strong> - ' + l.type + ' مرخصی' + hourText + '</div>' +
                    '<div style="font-size:0.8rem;">📅 ' + l.date + ' | ' + (l.desc || '') + '</div>' +
                    '<div class="actions">' +
                        '<button class="btn-approve" onclick="approveLeave(' + realIdx + ')">✔ تایید</button>' +
                        '<button class="btn-reject" onclick="openRejectReason(' + realIdx + ')">✖ رد با توضیح</button>' +
                    '</div>';
                requestsDiv.appendChild(div);
            });
        }
    }
    
    if (adminListDiv2 && isAdmin) {
        adminListDiv2.innerHTML = '';
        admins.forEach(function(a, idx) {
            var div = document.createElement('div');
            div.className = 'list-item';
            div.innerHTML = 
                '<div><span class="name">' + a.name + '</span><div class="time">🔑 ' + a.password + '</div></div>' +
                '<div><button class="btn btn-sm btn-danger" onclick="deleteAdmin(' + idx + ')"><i class="fas fa-trash"></i></button></div>';
            adminListDiv2.appendChild(div);
        });
    }
    
    // ===== محاسبه تعداد حاضرین بر اساس آخرین وضعیت هر نفر (نه فقط ورود امروز) =====
    // این‌طوری پرسنل مقیم که چند روز قبل ورود زده‌اند و هنوز خروج نزده‌اند هم «حاضر» حساب می‌شوند
    var present = persons.filter(function(p, pIdx) {
        var pLastLog = logs.filter(function(l) { return l.personIdx === pIdx; }).slice(-1)[0];
        return pLastLog && pLastLog.type === 'in';
    }).length;
    var leaveToday = leaves.filter(function(l) { return l.date === today && l.status === 'approved'; }).length;
    var absent = persons.length - present - leaveToday;
    document.getElementById('presentCount').textContent = toPersianNumber(present);
    document.getElementById('leaveCount').textContent = toPersianNumber(leaveToday);
    document.getElementById('absentCount').textContent = toPersianNumber(absent < 0 ? 0 : absent);
    
    // ===== بروز کردن لیست پرسنل در گزارشات =====
    populatePersonSelector();

    // ===== گزارشات =====
    if (reportPreview && isAdmin && selectedMonth) {
        var parts = selectedMonth.split('-');
        var year = parts[0];
        var month = parts[1];
        
        // فیلتر بر اساس پرسنل انتخابی
        var selectedPersonIdx = document.getElementById('reportPersonSelect') ? document.getElementById('reportPersonSelect').value : '';
        
        var monthLogs = logs.filter(function(l) {
            var parts2 = l.date.split('/');
            var matchMonth = parts2[0] === year && parts2[1] === month;
            var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
            return matchMonth && matchPerson;
        });
        
        var monthLeaves = leaves.filter(function(l) {
            var parts2 = l.date.split('/');
            var matchMonth = parts2[0] === year && parts2[1] === month && l.status === 'approved';
            var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
            return matchMonth && matchPerson;
        });
        
        var monthRejected = leaves.filter(function(l) {
            var parts2 = l.date.split('/');
            var matchMonth = parts2[0] === year && parts2[1] === month && l.status === 'rejected';
            var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
            return matchMonth && matchPerson;
        });
        
        if (monthLogs.length === 0 && monthLeaves.length === 0 && monthRejected.length === 0) {
            reportPreview.innerHTML = '<span style="opacity:0.5;">هیچ داده‌ای برای این ماه وجود ندارد</span>';
        } else {
            var months = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];

    if (!p) { showToast('پرسنل یافت نشد!', 'error'); return; }
    
    var personLogs = logs.filter(function(l) { return l.personIdx === idx; });
    var personLeaves = leaves.filter(function(l) { return l.personIdx === idx; });
    
    var rows = '';
    personLogs.forEach(function(l) {
        var typeText = l.type === 'in' ? '✅ ورود' : '❌ خروج';
        var bg = l.type === 'in' ? '#e8f5e9' : '#ffebee';
        rows += '<tr style="border-bottom:1px solid #eee;background:' + bg + ';"><td style="padding:8px;text-align:center;">' + typeText + '</td><td style="padding:8px;text-align:center;">' + l.date + '</td><td style="padding:8px;text-align:center;">' + l.time + '</td><td style="padding:8px;text-align:center;">ورود/خروج</td></tr>';
    });
    personLeaves.forEach(function(l) {
        var hourText = l.hour ? ' (' + l.hour + ')' : '';
        var statusText = l.status === 'approved' ? '✅ تایید شده' : l.status === 'rejected' ? '❌ رد شده' : '⏳ در انتظار';
        var statusColor = l.status === 'approved' ? '#2E7D32' : l.status === 'rejected' ? '#C62828' : '#E65100';
        var reasonText = l.reason ? '<br><small style="color:#C62828;">دلیل رد: ' + l.reason + '</small>' : '';
        rows += '<tr style="border-bottom:1px solid #eee;background:#fff8e1;"><td style="padding:8px;text-align:center;">🌙 ' + l.type + ' مرخصی' + hourText + '</td><td style="padding:8px;text-align:center;">' + l.date + '</td><td style="padding:8px;text-align:center;">' + (l.hour || '---') + '</td><td style="padding:8px;text-align:center;color:' + statusColor + ';">' + statusText + reasonText + '</td></tr>';
    });
    
    if (!rows) {
        showToast('⚠️ هیچ سابقه‌ای برای "' + p.name + '" ثبت نشده!', 'warning');
        return;
    }
    
    var printDiv = document.createElement('div');
    printDiv.style.cssText = 'padding:20px;font-family:Vazir,Tahoma,sans-serif;direction:rtl;background:white;width:700px;';
    printDiv.innerHTML = `
        <div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #6c5ce7;padding-bottom:15px;">
            <h2 style="color:#6c5ce7;">🏢 شرکت پی تا بام</h2>
            <h3 style="color:#333;">📋 کارنامه پرسنلی - ${p.name}</h3>
            <p style="color:#666;font-size:12px;">شیفت: ${p.shift}</p>
            <p style="color:#666;font-size:12px;">تاریخ چاپ: ${getTodayDisplay()} - ${getTime()}</p>
            <p style="color:#666;font-size:11px;">تعداد تردد: ${personLogs.length} | تعداد مرخصی: ${personLeaves.length}</p>
        </div>
        <table style="width:100%;border-collapse:collapse;margin-top:10px;">
            <thead>
                <tr style="background:#6c5ce7;color:white;">
                    <th style="padding:10px;text-align:center;">نوع</th>
                    <th style="padding:10px;text-align:center;">تاریخ</th>
                    <th style="padding:10px;text-align:center;">ساعت</th>
                    <th style="padding:10px;text-align:center;">وضعیت</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
        <div style="text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid #ddd;font-size:10px;color:#999;">طراحی توسط میثاق نوین طرح</div>
    `;
    
    var tempDiv = document.createElement('div');
    tempDiv.style.cssText = 'position:absolute;top:-9999px;left:-9999px;';
    tempDiv.appendChild(printDiv);
    document.body.appendChild(tempDiv);
    
    showToast('⏳ در حال ساخت PDF...', 'info');
    try {
        var canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff', logging: false, useCORS: true });
        var imgData = canvas.toDataURL('image/png');
        var { jsPDF } = window.jspdf;
        var pdf = new jsPDF('p', 'mm', 'a4');
        var imgWidth = 190;
        var imgHeight = (canvas.height * imgWidth) / canvas.width;
        var pageHeight = 277;
        var heightLeft = imgHeight;
        var position = 10;
        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
        while (heightLeft > 0) {
            position = heightLeft - imgHeight + 10;
            pdf.addPage();
            pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;
        }
        pdf.save('کارنامه_' + p.name + '.pdf');
        showToast('✅ PDF کارنامه "' + p.name + '" دانلود شد.', 'success');
    } catch(e) {
        showToast('❌ خطا در ساخت PDF: ' + e.message, 'error');
    }
    document.body.removeChild(tempDiv);
};

function renderCalendar() {
    try {
        var daysInMonth = getDaysInPersianMonth(calendarYear, calendarMonth);
        var firstDay = getFirstDayOfPersianMonth(calendarYear, calendarMonth);
        
        var months = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
        document.getElementById('calendarMonthYear').textContent = months[calendarMonth - 1] + ' ' + toPersianNumber(calendarYear);
        
        var grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        
        var weekDays = ['ش', 'ی', 'د', 'س', 'چ', 'پ', 'ج'];
        weekDays.forEach(function(day) {
            var div = document.createElement('div');
            div.className = 'day-header';
            div.textContent = day;
            grid.appendChild(div);
        });
        
        var today = getToday();
        var parts = today.split('/');
        var ty = parseInt(parts[0]);
        var tm = parseInt(parts[1]);
        var td = parseInt(parts[2]);
        
        for (var i = 0; i < firstDay; i++) {
            var div = document.createElement('div');
            grid.appendChild(div);
        }
        
        for (var i = 1; i <= daysInMonth; i++) {
            var div = document.createElement('div');
            div.className = 'day';
            var dateStr = calendarYear + '/' + String(calendarMonth).padStart(2, '0') + '/' + String(i).padStart(2, '0');
            div.textContent = toPersianNumber(i);
            
            if (calendarYear === ty && calendarMonth === tm && i === td) {
                div.classList.add('today');
            }
            
            div.onclick = (function(dateStr) {
                return function() {
                    if (leaveDateTarget === 'leave') {
                        document.getElementById('leaveDate').value = dateStr;
                        leaveDateTarget = '';
                    }
                    closeCalendar();
                };
            })(dateStr);
            grid.appendChild(div);
        }
    } catch(e) {
        console.log('Error in calendar:', e);
        document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;padding:20px;color:var(--danger);">⚠️ خطا در نمایش تقویم</div>';
    }
}

window.changeMonth = function(delta) {
    calendarMonth += delta;
    if (calendarMonth < 1) {
        calendarMonth = 12;
        calendarYear--;
    } else if (calendarMonth > 12) {
        calendarMonth = 1;
        calendarYear++;
    }
    renderCalendar();
};

// ===== خروجی اکسل =====
document.getElementById('exportExcelBtn').addEventListener('click', function() {
    if (!isAdmin) return;
    var month = document.getElementById('reportMonthSelect').value;
    if (!month) { showToast('ماه را انتخاب کنید.', 'warning'); return; }
    var parts = month.split('-');
    var year = parts[0];
    var m = parts[1];
    var selectedPersonIdx = document.getElementById('reportPersonSelect').value;
    
    var allData = [];
    
    var monthLogs = logs.filter(function(l) {
        var parts2 = l.date.split('/');
        var matchMonth = parts2[0] === year && parts2[1] === m;
        var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
        return matchMonth && matchPerson;
    });
    monthLogs.forEach(function(l) {
        var p = persons[l.personIdx];
        allData.push({ 'نام': p ? p.name : 'نامشخص', 'شیفت': p ? p.shift : '---', 'نوع': l.type === 'in' ? 'ورود' : 'خروج', 'تاریخ': l.date, 'ساعت': l.time, 'وضعیت': 'ورود/خروج' });
    });
    
    var monthLeaves = leaves.filter(function(l) {
        var parts2 = l.date.split('/');
        var matchMonth = parts2[0] === year && parts2[1] === m && l.status === 'approved';
        var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
        return matchMonth && matchPerson;
    });
    monthLeaves.forEach(function(l) {
        var p = persons[l.personIdx];
        var hourText = l.hour ? ' (' + l.hour + ')' : '';
        allData.push({ 'نام': p ? p.name : 'نامشخص', 'شیفت': p ? p.shift : '---', 'نوع': l.type + ' مرخصی' + hourText, 'تاریخ': l.date, 'ساعت': l.hour || '---', 'وضعیت': '✅ تایید شده' });
    });
    
    var monthRejected = leaves.filter(function(l) {
        var parts2 = l.date.split('/');
        var matchMonth = parts2[0] === year && parts2[1] === m && l.status === 'rejected';
        var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);
        return matchMonth && matchPerson;
    });
    monthRejected.forEach(function(l) {
        var p = persons[l.personIdx];
        var hourText = l.hour ? ' (' + l.hour + ')' : '';
        allData.push({ 'نام': p ? p.name : 'نامشخص', 'شیفت': p ? p.shift : '---', 'نوع': l.type + ' مرخصی' + hourText + ' (رد شده)', 'تاریخ': l.date, 'ساعت': l.hour || '---', 'وضعیت': '❌ رد شده - ' + (l.reason || 'بدون دلیل') });
    });
    
    if (allData.length === 0) { showToast('داده‌ای وجود ندارد.', 'warning'); return; }
    
    var ws = XLSX.utils.json_to_sheet(allData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'گزارش کامل');
    var months = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
    var personSuffix = (selectedPersonIdx !== '' && persons[parseInt(selectedPersonIdx)]) ? '_' + persons[parseInt(selectedPersonIdx)].name : '';
    XLSX.writeFile(wb, 'گزارش_' + months[parseInt(m) - 1] + '_' + year + personSuffix + '.xlsx');
    showToast('✅ اکسل دانلود شد.', 'success');
});

        var matchPerson = selectedPersonIdx === '' || l.personIdx === parseInt(selectedPersonIdx);

    }
    
    var months = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
    var monthName = months[parseInt(m) - 1] + ' ' + toPersianNumber(parseInt(year));
    var personTitle = (selectedPersonIdx !== '' && persons[parseInt(selectedPersonIdx)]) ? ' - ' + persons[parseInt(selectedPersonIdx)].name : '';
    var personSuffix = (selectedPersonIdx !== '' && persons[parseInt(selectedPersonIdx)]) ? '_' + persons[parseInt(selectedPersonIdx)].name : '';
    
    var printDiv = document.createElement('div');
    printDiv.style.cssText = 'padding:20px;font-family:Vazir,Tahoma,sans-serif;direction:rtl;background:white;width:700px;';
    
    var rows = '';
    
    monthLogs.forEach(function(l) {
        var p = persons[l.personIdx];
        var typeText = l.type === 'in' ? '✅ ورود' : '❌ خروج';
        rows += '<tr style="border-bottom:1px solid #eee;">' +
            '<td style="padding:8px;text-align:center;">' + (p ? p.name : 'نامشخص') + '</td>' +
            '<td style="padding:8px;text-align:center;">' + typeText + '</td>' +
            '<td style="padding:8px;text-align:center;">' + l.date + '</td>' +
            '<td style="padding:8px;text-align:center;">' + l.time + '</td>' +
            '<td style="padding:8px;text-align:center;">ورود/خروج</td>' +
            '</tr>';
    });
    
    monthLeaves.forEach(function(l) {
        var p = persons[l.personIdx];
        var hourText = l.hour ? ' (' + l.hour + ')' : '';
        rows += '<tr style="border-bottom:1px solid #eee;background:#e8f5e9;">' +
            '<td style="padding:8px;text-align:center;">' + (p ? p.name : 'نامشخص') + '</td>' +
            '<td style="padding:8px;text-align:center;">🌙 ' + l.type + ' مرخصی' + hourText + '</td>' +
            '<td style="padding:8px;text-align:center;">' + l.date + '</td>' +
            '<td style="padding:8px;text-align:center;">' + (l.hour || '---') + '</td>' +
            '<td style="padding:8px;text-align:center;color:#2E7D32;">✅ تایید شده</td>' +
            '</tr>';
    });
    
    monthRejected.forEach(function(l) {
        var p = persons[l.personIdx];
        var hourText = l.hour ? ' (' + l.hour + ')' : '';
        rows += '<tr style="border-bottom:1px solid #eee;background:#ffebee;">' +
            '<td style="padding:8px;text-align:center;">' + (p ? p.name : 'نامشخص') + '</td>' +
            '<td style="padding:8px;text-align:center;">🌙 ' + l.type + ' مرخصی' + hourText + ' (رد شده)</td>' +
            '<td style="padding:8px;text-align:center;">' + l.date + '</td>' +
            '<td style="padding:8px;text-align:center;">' + (l.hour || '---') + '</td>' +
            '<td style="padding:8px;text-align:center;color:#C62828;">❌ رد شده - ' + (l.reason || 'بدون دلیل') + '</td>' +
            '</tr>';
    });
    
    printDiv.innerHTML = `
        <div style="text-align:center;margin-bottom:20px;border-bottom:2px solid #1f5e7e;padding-bottom:15px;">
            <h2 style="color:#1f5e7e;">🏢 شرکت پی تا بام</h2>
            <h3 style="color:#333;">📊 گزارش - ماه ${monthName}${personTitle}</h3>
            <p style="color:#666;font-size:12px;">تاریخ چاپ: ${getTodayDisplay()} - ${getTime()}</p>
            <p style="color:#666;font-size:11px;">تعداد کل ثبت‌ها: ${monthLogs.length + monthLeaves.length + monthRejected.length} مورد</p>
            <p style="color:#666;font-size:11px;">✅ مرخصی تایید شده: ${monthLeaves.length} | ❌ مرخصی رد شده: ${monthRejected.length}</p>
        </div>
        <table style="width:100%;border-collapse:collapse;margin-top:10px;">
            <thead>
                <tr style="background:#1f5e7e;color:white;">
                    <th style="padding:10px;text-align:center;">نام پرسنل</th>
                    <th style="padding:10px;text-align:center;">نوع</th>
                    <th style="padding:10px;text-align:center;">تاریخ</th>
                    <th style="padding:10px;text-align:center;">ساعت</th>

                </tr>
            </thead>
            <tbody>${rows || '<tr><td colspan="5" style="padding:20px;text-align:center;color:#999;">هیچ داده‌ای وجود ندارد</td></tr>'}</tbody>
        </table>
        <div style="text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid #ddd;font-size:10px;color:#999;">
            طراحی توسط میثاق نوین طرح
        </div>
    `;
    
    var tempDiv = document.createElement('div');
    tempDiv.style.cssText = 'position:absolute;top:-9999px;left:-9999px;';
    tempDiv.appendChild(printDiv);
    document.body.appendChild(tempDiv);
    
    try {
        var canvas = await html2canvas(tempDiv, {
            scale: 2,
            backgroundColor: '#ffffff',
            logging: false,
            useCORS: true
        });
        var imgData = canvas.toDataURL('image/png');
        var { jsPDF } = window.jspdf;
        var pdf = new jsPDF('p', 'mm', 'a4');
        var imgWidth = 190;
        var imgHeight = (canvas.height * imgWidth) / canvas.width;
        var pageHeight = 277;
        var heightLeft = imgHeight;
        var position = 10;
        
        pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
        
        while (heightLeft > 0) {
            position = heightLeft - imgHeight + 10;
            pdf.addPage();
            pdf.addImage(imgData, 'PNG', 10, position, imgWidth, imgHeight);
            heightLeft -= pageHeight;
        }
        
        pdf.save('گزارش_' + monthName + personSuffix + '.pdf');
        showToast('✅ PDF دانلود شد.', 'success');
    } catch(e) {
        console.error(e);
        showToast('❌ خطا در ساخت PDF: ' + e.message, 'error');
    }
    document.body.removeChild(tempDiv);
});
